<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSAS Weekly Bulletin - 第5期</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", PingFang SC, sans-serif;
        }
        body {
            background: #ffffff;
            padding: 30px 16px;
            max-width: 780px;
            margin: 0 auto;
        }
        /* 整体大容器：干净圆角 + 轻微阴影 */
        .container {
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            position: relative;
        }
        /* 返回首页链接 - 放在容器右上角 */
        .back-link {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #374151;
        }
        /* 标题区 */
        .header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f3f4f6;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #6b7280;
        }
        /* 资讯卡片通用样式 */
        .card {
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-content {
            font-size: 15px;
            line-height: 1.8;
            color: #374151;
        }
        /* 多巴胺配色方案 */
        .card-yellow {
            background: linear-gradient(135deg, #fef9c3 0%, #fef3c7 100%);
            border-left: 4px solid #fbbf24;
        }
        .card-blue {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border-left: 4px solid #3b82f6;
        }
        .card-pink {
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            border-left: 4px solid #ec4899;
        }
        /* 底部信息 */
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f3f4f6;
            font-size: 13px;
            color: #9ca3af;
            text-align: center;
        }
    </style>

    <!-- 鈺愨晲鈺愨晲鈺?鐧惧害缁熻浠ｇ爜 鈺愨晲鈺?-->

</head>
<body>
    <div class="container">
        <!-- 返回首页链接 -->
        <a href="index.html" class="back-link">← 返回首页</a>
        
        <!-- 标题区 -->
        <div class="header">
            <div class="title">科室简讯</div>
            <div class="subtitle">第5期 ｜ 2026.04.19</div>
        </div>

        <!-- 板块1：浅柠檬黄 -->
        <div class="card card-yellow">
            <div class="card-title">🚗 智己LS8上市（24.98-29.98万元）</div>
            <div class="card-content">
                <strong style="color: #1f2937;">30万内唯一搭载全线控转向SUV，</strong>纯电续航430km、综合续航1605km，搭载800V超充平台，代言人刘翔出席活动。
            </div>
        </div>

        <!-- 板块2：浅天蓝 -->
        <div class="card card-blue">
            <div class="card-title">🏢 小鹏汽车正式更名为"小鹏集团"</div>
            <div class="card-content">
                4月1日，向<strong style="color: #1f2937;">"物理AI科技集团"战略升级，</strong>业务拓展至智能汽车、飞行汽车、人形机器人、AI芯片等多领域。
            </div>
        </div>

        <!-- 板块3：浅玫瑰粉 -->
        <div class="card card-pink">
            <div class="card-title">🌏 中国品牌霸榜泰国车展</div>
            <div class="card-content">
                4月落幕的曼谷国际车展上，<strong style="color: #1f2937;">中国品牌占据订单榜前10中的8席，</strong>比亚迪夺冠、上汽MG位列第4，订单总量同比大增71.8%，成为泰国电动化转型核心力量。
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="footer">
            报送：科室各成员 | 整理人：杨秀丽
        </div>
    </div>
</body>
</html>
